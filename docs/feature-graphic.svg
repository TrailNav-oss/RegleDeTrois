<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Decorative elements -->
  <circle cx="180" cy="250" r="120" fill="#FF6B35" opacity="0.06"/>
  <circle cx="844" cy="250" r="120" fill="#FF6B35" opacity="0.06"/>

  <!-- App name -->
  <text x="512" y="200" text-anchor="middle" font-size="72" font-weight="900" fill="#FFFFFF" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" letter-spacing="6">PROPORTIO</text>

  <!-- Decorative line -->
  <rect x="362" y="220" width="300" height="3" rx="2" fill="#FF6B35" opacity="0.6"/>

  <!-- Tagline -->
  <text x="512" y="280" text-anchor="middle" font-size="26" fill="#FF6B35" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="600">Proportions · Recettes · Pourcentages · Conversions</text>

  <!-- Feature icons row -->
  <!-- Calculator -->
  <text x="232" y="380" text-anchor="middle" font-size="40" fill="#FFFFFF" opacity="0.7" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">A/B = C/X</text>
  <text x="232" y="415" text-anchor="middle" font-size="16" fill="#FFFFFF" opacity="0.35" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">Règle de trois</text>

  <!-- Recipes -->
  <text x="432" y="380" text-anchor="middle" font-size="40" fill="#FFFFFF" opacity="0.7" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">×2</text>
  <text x="432" y="415" text-anchor="middle" font-size="16" fill="#FFFFFF" opacity="0.35" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">Recettes</text>

  <!-- Percentages -->
  <text x="612" y="380" text-anchor="middle" font-size="40" fill="#FFFFFF" opacity="0.7" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">15%</text>
  <text x="612" y="415" text-anchor="middle" font-size="16" fill="#FFFFFF" opacity="0.35" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">Pourcentages</text>

  <!-- Conversions -->
  <text x="792" y="380" text-anchor="middle" font-size="40" fill="#FFFFFF" opacity="0.7" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">°C↔°F</text>
  <text x="792" y="415" text-anchor="middle" font-size="16" fill="#FFFFFF" opacity="0.35" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">Conversions</text>
</svg>
